server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Hashed assets: immutable cache (Vite fingerprints filenames) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback: all non-file routes serve index.html ──
    location / {
        try_files $uri $uri/ /index.html;

        # Don't cache the HTML shell — it contains the hashed asset references
        # and must always be fresh so a new deploy is picked up immediately.
        add_header Cache-Control "no-cache";
    }

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
